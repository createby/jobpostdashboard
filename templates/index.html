<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채용박람회 PDF 에디터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #222; }

  header {
    background: #2e7d32; color: white; padding: 16px 32px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; }

  .container { display: flex; height: calc(100vh - 56px); }

  /* 좌측 패널 */
  .sidebar {
    width: 300px; background: white; border-right: 1px solid #ddd;
    display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid #eee;
    display: flex; flex-direction: column; gap: 10px;
  }
  .upload-btn {
    display: block; width: 100%; padding: 10px;
    background: #2e7d32; color: white; border: none;
    border-radius: 6px; cursor: pointer; font-size: 14px; text-align: center;
  }
  .upload-btn:hover { background: #1b5e20; }
  .search-input {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd;
    border-radius: 6px; font-size: 13px;
  }
  .company-list { overflow-y: auto; flex: 1; }
  .company-item {
    padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background 0.15s;
  }
  .company-item:hover { background: #f5f5f5; }
  .company-item.active { background: #e8f5e9; border-left: 3px solid #2e7d32; }
  .company-item .booth { font-size: 11px; color: #888; }
  .company-item .name { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .company-item .zone { font-size: 11px; color: #4caf50; margin-top: 2px; }

  /* 우측 에디터 */
  .editor {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: #aaa;
  }
  .empty-state svg { width: 64px; height: 64px; opacity: 0.3; }

  .editor-card {
    background: white; border-radius: 10px; padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .editor-card h2 {
    font-size: 15px; font-weight: 700; color: #2e7d32;
    margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid #e8f5e9;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: #666; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 13px; font-family: inherit; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: #4caf50; box-shadow: 0 0 0 2px rgba(76,175,80,0.15);
  }

  /* 채용계획 테이블 */
  .hire-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hire-table th {
    background: #2e7d32; color: white; padding: 8px;
    text-align: center; font-weight: 600;
  }
  .hire-table td { padding: 6px; border: 1px solid #ddd; }
  .hire-table td input {
    width: 100%; border: none; padding: 4px; font-size: 13px;
    font-family: inherit; background: transparent;
  }
  .hire-table td input:focus { outline: none; background: #f9fff9; }
  .btn-add-row {
    margin-top: 8px; padding: 6px 14px; background: #e8f5e9;
    color: #2e7d32; border: 1px solid #a5d6a7; border-radius: 4px;
    cursor: pointer; font-size: 12px;
  }
  .btn-del-row {
    background: #ffebee; color: #c62828; border: none;
    border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px;
  }

  /* 하단 버튼 */
  .action-bar {
    position: sticky; bottom: 0; background: white;
    padding: 14px 24px; border-top: 1px solid #eee;
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn-primary {
    padding: 10px 24px; background: #2e7d32; color: white;
    border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .btn-primary:hover { background: #1b5e20; }
  .btn-secondary {
    padding: 10px 24px; background: white; color: #2e7d32;
    border: 2px solid #2e7d32; border-radius: 6px; cursor: pointer; font-size: 14px;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #323232; color: white; padding: 10px 20px;
    border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
  </svg>
  <h1>채용박람회 PDF 에디터</h1>
</header>

<div class="container">
  <!-- 좌측 기업 목록 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <label class="upload-btn" for="file-input">📂 엑셀 파일 업로드</label>
      <input type="file" id="file-input" accept=".xlsx,.xls">
      <input type="text" class="search-input" id="search" placeholder="기업명 검색...">
    </div>
    <div class="company-list" id="company-list">
      <div style="padding:20px; text-align:center; color:#aaa; font-size:13px;">
        엑셀 파일을 업로드하면<br>기업 목록이 표시됩니다
      </div>
    </div>
  </div>

  <!-- 우측 에디터 -->
  <div style="flex:1; display:flex; flex-direction:column;">
    <div class="editor" id="editor">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>좌측에서 기업을 선택하세요</p>
      </div>
    </div>
    <div class="action-bar" id="action-bar" style="display:none;">
      <button class="btn-secondary" onclick="resetForm()">초기화</button>
      <button class="btn-primary" onclick="generatePDF()">📄 PDF 생성 & 다운로드</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let companies = [];
let currentIndex = -1;
let headers = [];

// 엑셀 업로드
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  showToast('엑셀 파일 읽는 중...');
  const res = await fetch('/upload_excel', { method: 'POST', body: fd });
  const data = await res.json();
  headers = data.headers;
  companies = data.companies;
  renderList(companies);
  showToast(`${companies.length}개 기업 로드 완료`);
});

// 검색
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = companies.filter(c =>
    (c['기업명'] || '').toLowerCase().includes(q) ||
    (c['부스번호'] || '').toLowerCase().includes(q)
  );
  renderList(filtered);
});

function renderList(list) {
  const el = document.getElementById('company-list');
  if (!list.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">검색 결과 없음</div>';
    return;
  }
  el.innerHTML = list.map((c, i) => `
    <div class="company-item ${currentIndex === i ? 'active' : ''}"
         onclick="selectCompany(${companies.indexOf(c)})">
      <div class="booth">${c['부스번호'] || ''} · #${c['번호'] || ''}</div>
      <div class="name">${c['기업명'] || '(기업명 없음)'}</div>
      <div class="zone">${c['ZONE'] || ''}</div>
    </div>
  `).join('');
}

function selectCompany(idx) {
  currentIndex = idx;
  renderList(companies); // active 상태 업데이트
  renderEditor(companies[idx]);
  document.getElementById('action-bar').style.display = 'flex';
}

function renderEditor(c) {
  const hireRows = parseHireRows(c['채용계획'] || '');
  document.getElementById('editor').innerHTML = `
    <div class="editor-card">
      <h2>기본 정보</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>번호</label>
          <input id="f_번호" value="${esc(c['번호'])}">
        </div>
        <div class="form-group">
          <label>부스번호</label>
          <input id="f_부스번호" value="${esc(c['부스번호'])}">
        </div>
        <div class="form-group">
          <label>ZONE</label>
          <input id="f_ZONE" value="${esc(c['ZONE'])}">
        </div>
        <div class="form-group">
          <label>기업명</label>
          <input id="f_기업명" value="${esc(c['기업명'])}">
        </div>
        <div class="form-group">
          <label>업종</label>
          <input id="f_업종" value="${esc(c['업종'])}">
        </div>
        <div class="form-group">
          <label>사업내용</label>
          <input id="f_사업내용" value="${esc(c['사업내용'])}">
        </div>
        <div class="form-group full">
          <label>회사주소</label>
          <input id="f_회사주소" value="${esc(c['회사주소'])}">
        </div>
        <div class="form-group">
          <label>태그 (예: 면접,상담)</label>
          <input id="f_태그" value="${esc(c['태그'] || '면접,상담')}">
        </div>
        <div class="form-group">
          <label>QR코드 URL</label>
          <input id="f_qr_url" value="${esc(c['qr_url'] || '')}">
        </div>
        <div class="form-group">
          <label>배경색 (포인트 컬러)</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="color" id="f_배경색" value="${esc(c['배경색'] || '#4CAF50')}"
              style="width:44px;height:36px;padding:2px;border:1px solid #ddd;border-radius:6px;cursor:pointer;">
            <input type="text" id="f_배경색_hex" value="${esc(c['배경색'] || '#4CAF50')}"
              style="flex:1;" oninput="syncColor('배경색')">
          </div>
        </div>
        <div class="form-group">
          <label>배경색 연한 (섹션 배경)</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="color" id="f_배경색연한" value="${esc(c['배경색연한'] || '#E8F5E9')}"
              style="width:44px;height:36px;padding:2px;border:1px solid #ddd;border-radius:6px;cursor:pointer;">
            <input type="text" id="f_배경색연한_hex" value="${esc(c['배경색연한'] || '#E8F5E9')}"
              style="flex:1;" oninput="syncColor('배경색연한')">
          </div>
        </div>
      </div>
    </div>

    <div class="editor-card">
      <h2>기업 소개</h2>
      <div class="form-group">
        <textarea id="f_기업소개" rows="5">${esc(c['기업소개'])}</textarea>
      </div>
    </div>

    <div class="editor-card">
      <h2>채용계획</h2>
      <table class="hire-table">
        <thead>
          <tr>
            <th>모집직무</th><th>경력구분</th><th>고용형태</th><th>학력</th><th>모집인원</th><th></th>
          </tr>
        </thead>
        <tbody id="hire-tbody">
          ${hireRows.map((r, i) => hireRowHTML(r, i)).join('')}
        </tbody>
      </table>
      <button class="btn-add-row" onclick="addHireRow()">+ 행 추가</button>
    </div>

    <div class="editor-card">
      <h2>상세 정보</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>담당업무</label>
          <textarea id="f_담당업무" rows="3">${esc(c['담당업무'])}</textarea>
        </div>
        <div class="form-group full">
          <label>자격요건 우대사항</label>
          <textarea id="f_자격요건" rows="3">${esc(c['자격요건'])}</textarea>
        </div>
        <div class="form-group">
          <label>급여조건</label>
          <input id="f_급여조건" value="${esc(c['급여조건'])}">
        </div>
        <div class="form-group">
          <label>근무지역</label>
          <input id="f_근무지역" value="${esc(c['근무지역'])}">
        </div>
        <div class="form-group">
          <label>근무시간</label>
          <input id="f_근무시간" value="${esc(c['근무시간'])}">
        </div>
        <div class="form-group full">
          <label>복리후생</label>
          <textarea id="f_복리후생" rows="3">${esc(c['복리후생'])}</textarea>
        </div>
      </div>
    </div>
  `;
}

function hireRowHTML(r, i) {
  const cols = ['모집직무','경력구분','고용형태','학력','모집인원'];
  return `<tr id="hire-row-${i}">
    ${cols.map((col, j) => `<td><input class="hire-input" data-row="${i}" data-col="${j}" value="${esc(r[j] || '')}"></td>`).join('')}
    <td><button class="btn-del-row" onclick="delHireRow(${i})">삭제</button></td>
  </tr>`;
}

let hireRowCount = 0;
function addHireRow() {
  const tbody = document.getElementById('hire-tbody');
  const i = hireRowCount++;
  const tr = document.createElement('tr');
  tr.id = `hire-row-${i}`;
  tr.innerHTML = hireRowHTML(['','','','',''], i).replace(/<tr[^>]*>|<\/tr>/g, '');
  tbody.appendChild(tr);
}

function delHireRow(i) {
  const row = document.getElementById(`hire-row-${i}`);
  if (row) row.remove();
}

function parseHireRows(val) {
  if (!val) return [['','','','','']];
  try { return JSON.parse(val); } catch {}
  return [['','','','','']];
}

function collectHireRows() {
  const rows = [];
  document.querySelectorAll('#hire-tbody tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input.hire-input');
    if (inputs.length) rows.push(Array.from(inputs).map(i => i.value));
  });
  return rows;
}

function collectData() {
  const fields = ['번호','부스번호','ZONE','기업명','업종','사업내용','회사주소',
                  '기업소개','담당업무','자격요건','급여조건','근무지역','근무시간','복리후생','태그','qr_url'];
  const data = {};
  fields.forEach(f => {
    const el = document.getElementById(`f_${f}`);
    data[f] = el ? el.value : '';
  });
  // 컬러 피커
  const colorEl = document.getElementById('f_배경색');
  data['배경색'] = colorEl ? colorEl.value : '#4CAF50';
  const colorLightEl = document.getElementById('f_배경색연한');
  data['배경색연한'] = colorLightEl ? colorLightEl.value : '#E8F5E9';
  data['채용계획'] = collectHireRows();
  return data;
}

function syncColor(key) {
  const hex = document.getElementById(`f_${key}_hex`).value;
  if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
    document.getElementById(`f_${key}`).value = hex;
  }
}

// 컬러 피커 → hex 텍스트 동기화
document.addEventListener('input', (e) => {
  if (e.target.id === 'f_배경색') document.getElementById('f_배경색_hex').value = e.target.value;
  if (e.target.id === 'f_배경색연한') document.getElementById('f_배경색연한_hex').value = e.target.value;
});

async function generatePDF() {
  const data = collectData();
  showToast('PDF 생성 중...');
  const res = await fetch('/generate_pdf', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!res.ok) { showToast('오류 발생'); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${data['부스번호']}_${data['기업명']}.pdf`;
  a.click();
  showToast('PDF 다운로드 완료');
}

function resetForm() {
  if (currentIndex >= 0) renderEditor(companies[currentIndex]);
}

function esc(v) {
  if (!v) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
